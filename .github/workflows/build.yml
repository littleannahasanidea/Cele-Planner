name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          mkdir -p app/src/main/java/com/cele/planner
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.cele.planner">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="Cele Planner" android:hardwareAccelerated="true" android:usesCleartextTraffic="true" android:theme="@style/AppTheme">
              <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          EOF

          cat > app/src/main/java/com/cele/planner/MainActivity.java << 'EOF'
          package com.cele.planner;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.*;
          public class MainActivity extends Activity {
            private WebView w;
            @Override protected void onCreate(Bundle s) {
              super.onCreate(s);
              w = new WebView(this); setContentView(w);
              WebSettings ws = w.getSettings();
              ws.setJavaScriptEnabled(true);
              ws.setDomStorageEnabled(true);
              ws.setAllowFileAccessFromFileURLs(true);
              ws.setAllowUniversalAccessFromFileURLs(true);
              w.setWebChromeClient(new WebChromeClient());
              w.loadUrl("file:///android_asset/www/index.html");
            }
            @Override public void onBackPressed() {
              if (w.canGoBack()) w.goBack(); else super.onBackPressed();
            }
          }
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
              <item name="android:statusBarColor">#C04F68</item>
            </style>
          </resources>
          EOF

          cat > settings.gradle << 'EOF'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "CelePlanner"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          EOF

          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          android {
            compileSdkVersion 34
            namespace 'com.cele.planner'
            defaultConfig {
              applicationId "com.cele.planner"
              minSdkVersion 21
              targetSdkVersion 34
              versionCode 1
              versionName "1.0"
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_1_8
              targetCompatibility JavaVersion.VERSION_1_8
            }
          }
          EOF

          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          EOF

          curl -s https://raw.githubusercontent.com/littleannahasanidea/Cele-Planner/main/app/src/main/assets/www/sw.js -o app/src/main/assets/www/sw.js
          curl -s https://raw.githubusercontent.com/littleannahasanidea/Cele-Planner/main/app/src/main/assets/www/index.html -o app/src/main/assets/www/index.html

          wget -q https://services.gradle.org/distributions/gradle-8.1-bin.zip
          unzip -q gradle-8.1-bin.zip
          ./gradle-8.1/bin/gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CelePlanner-APK
          path: app/build/outputs/apk/debug/app-debug.apk
