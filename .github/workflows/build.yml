name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          mkdir -p app/src/main/java/com/cele/planner
          mkdir -p app/src/main/assets/www
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.cele.planner">
            <uses-permission android:name="android.permission.INTERNET" />
            <application android:label="Cele Planner" android:theme="@style/AppTheme" android:hardwareAccelerated="true" android:usesCleartextTraffic="true">
              <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="portrait">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
            </application>
          </manifest>
          MANIFEST

          cat > app/src/main/java/com/cele/planner/MainActivity.java << 'JAVA'
          package com.cele.planner;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.*;
          public class MainActivity extends Activity {
            private WebView w;
            @Override protected void onCreate(Bundle s) {
              super.onCreate(s);
              w = new WebView(this); setContentView(w);
              WebSettings ws = w.getSettings();
              ws.setJavaScriptEnabled(true);
              ws.setDomStorageEnabled(true);
              ws.setAllowFileAccessFromFileURLs(true);
              ws.setAllowUniversalAccessFromFileURLs(true);
              w.setWebChromeClient(new WebChromeClient());
              w.loadUrl("file:///android_asset/www/index.html");
            }
            @Override public void onBackPressed() {
              if (w.canGoBack()) w.goBack(); else super.onBackPressed();
            }
          }
          JAVA

          cat > app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="android:Theme.Material.Light.NoActionBar">
              <item name="android:statusBarColor">#C04F68</item>
            </style>
          </resources>
          STYLES

          cp app/src/main/assets/www/sw.js app/src/main/assets/www/sw.js 2>/dev/null || true

          cat > settings.gradle << 'SETTINGS'
          pluginManagement {
            repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
          }
          rootProject.name = "CelePlanner"
          include ':app'
          SETTINGS

          cat > build.gradle << 'BUILDROOT'
          plugins { id 'com.android.application' version '8.1.0' apply false }
          BUILDROOT

          cat > app/build.gradle << 'APPBUILD'
          plugins { id 'com.android.application' }
          android {
            compileSdk 34
            namespace 'com.cele.planner'
            defaultConfig {
              applicationId "com.cele.planner"
              minSdk 21; targetSdk 34
              versionCode 1; versionName "1.0"
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_1_8
              targetCompatibility JavaVersion.VERSION_1_8
            }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          APPBUILD

          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: CelePlanner-APK
          path: app/build/outputs/apk/debug/app-debug.apk
